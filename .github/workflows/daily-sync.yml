name: Daily Catalog Sync

on:
  schedule:
    - cron: '0 3 * * *' # Every day at 3:00 AM
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Sync Script
        run: node tools/sync.mjs

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Mundo PC Bot"
          git config --global user.email "bot@mundopc.site"
          git add assets/js/builder.js
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: daily price sync [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
